<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Akbar AI Services</title>
  <style>
    body { font-family: sans-serif; max-width: 560px; margin: 60px auto; padding: 0 20px; color: #333; line-height: 1.6; }
    h1 { font-size: 1.4rem; }
    label { display: block; margin-top: 1.2rem; font-weight: 600; font-size: 0.9rem; }
    input[type="text"], input[type="email"], input[type="tel"], textarea {
      width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ccc;
      border-radius: 4px; font-size: 1rem; box-sizing: border-box;
    }
    .consent { margin-top: 1.2rem; display: flex; align-items: flex-start; gap: 10px; font-size: 0.85rem; color: #555; }
    .consent input { margin-top: 3px; flex-shrink: 0; }
    button { margin-top: 1.5rem; background: #2563eb; color: white; border: none;
      padding: 12px 28px; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .note { margin-top: 1rem; font-size: 0.8rem; color: #777; }
  </style>
</head>
<body>
  <h1>Get in Touch</h1>
  <p>Fill out the form below and we'll follow up with you shortly.</p>

  <form>
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Jane Smith" required>

    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="jane@example.com" required>

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>

    <label for="message">How can we help?</label>
    <textarea id="message" rows="4" placeholder="Tell us about your inquiry..."></textarea>

    <div class="consent">
      <input type="checkbox" id="sms-consent" required>
      <label for="sms-consent" style="font-weight: normal; margin-top: 0;">
        I agree to receive SMS messages from Akbar AI Services related to my inquiry.
        Message and data rates may apply. Reply <strong>STOP</strong> to opt out at any time.
        View our <a href="privacy-policy.html">Privacy Policy</a> and
        <a href="terms-and-conditions.html">Terms and Conditions</a>.
      </label>
    </div>

    <button type="submit">Submit</button>
    <p class="note">We typically respond within 1 business day.</p>
  </form>
</body>
</html>
